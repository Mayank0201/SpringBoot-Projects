spring.application.name=cinetracker-backend

spring.config.import=optional:classpath:.env

spring.datasource.url=jdbc:postgresql://localhost:5432/cinetracker
spring.datasource.username=postgres
spring.datasource.password=${PQSL_DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
jwt.refresh-expiration=604800000

tmdb.api.key=${TMDB_API_KEY}
tmdb.api.baseUrl=https://api.themoviedb.org/3

spring.cache.type=redis
spring.data.redis.host=redis
spring.data.redis.timeout=60000
spring.data.redis.jedis.pool.max-active=20
spring.data.redis.jedis.pool.max-idle=10
spring.data.redis.jedis.pool.min-idle=5
spring.data.redis.port=6379
