name: CI - CineTracker Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'cinetracker-backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'cinetracker-backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cinetracker_test
          POSTGRES_USER: cinetracker
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Make gradlew executable
      working-directory: cinetracker-backend
      run: chmod +x ./gradlew
    
    - name: Build with Gradle
      working-directory: cinetracker-backend
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cinetracker_test
        SPRING_DATASOURCE_USERNAME: cinetracker
        SPRING_DATASOURCE_PASSWORD: password
      run: ./gradlew clean build -x test
    
    - name: Run tests
      working-directory: cinetracker-backend
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cinetracker_test
        SPRING_DATASOURCE_USERNAME: cinetracker
        SPRING_DATASOURCE_PASSWORD: password
      run: ./gradlew test
    
    - name: Validate migration files
      working-directory: cinetracker-backend
      run: |
        if [ ! -f "src/main/resources/db/migration/V1__create_movie_ratings_table.sql" ]; then
          echo "ERROR: Migration file not found"
          exit 1
        fi
        echo "Migration file validated ✓"
