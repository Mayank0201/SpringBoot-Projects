spring.datasource.url=jdbc:postgresql://localhost:5432/cinetracker_test
spring.datasource.username=cinetracker
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
#create and then drop the schema at the end of the session. This is useful for testing, as it ensures a clean state for each test run.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# TMDB Config (dummy values for testing)
tmdb.api.key=test_key
tmdb.api.base-url=https://api.themoviedb.org/3

# JWT Config (dummy values for testing)
jwt.secret=test_secret_key_for_testing_only
jwt.expiration=3600000
jwt.refresh-expiration=86400000