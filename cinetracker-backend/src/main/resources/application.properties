spring.application.name=cinefolio-backend

spring.config.import=optional:classpath:.env
spring.profiles.default=dev
spring.main.lazy-initialization=${SPRING_MAIN_LAZY_INITIALIZATION:false}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cinetracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PQSL_DB_PASSWORD:}}
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.open-in-view=false

server.port=${PORT:8080}
server.compression.enabled=true
server.compression.min-response-size=1024
server.tomcat.threads.max=20
server.tomcat.accept-count=50
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
jwt.refresh-expiration=2592000000

tmdb.api.key=${TMDB_API_KEY}
tmdb.api.baseUrl=https://api.themoviedb.org/3

spring.cache.type=${SPRING_CACHE_TYPE:redis}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.username=${SPRING_DATA_REDIS_USERNAME:default}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL:false}
spring.data.redis.timeout=5000
spring.data.redis.jedis.pool.max-active=20
spring.data.redis.jedis.pool.max-idle=10
spring.data.redis.jedis.pool.min-idle=5

spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=false
spring.flyway.validate-on-migrate=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.mail.enabled=false

# Brevo Email API configuration
brevo.api.key=${BREVO_API_KEY:}

# Email verification
email.verification.token-expiry-hours=24
email.from-address=${MAIL_FROM_ADDRESS:mayankmadhavi80@gmail.com}
email.from-name=${MAIL_FROM_NAME:CineFolio}
app.backend.base-url=${APP_BACKEND_BASE_URL:http://localhost:8080}
