<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CineTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #fbbf24;
            --primary-hover: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(251, 191, 36, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
        }

        .icon-container.success {
            background: rgba(16, 185, 129, 0.1);
        }

        .icon {
            color: var(--primary);
            font-size: 40px;
        }

        .icon.success {
            color: var(--success);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            display: block;
            width: 100%;
            background-color: var(--primary);
            color: #000;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(251, 191, 36, 0.3);
            font-family: inherit;
            margin-top: 2rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(251, 191, 36, 0.4);
        }

        .btn:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-msg {
            color: var(--error);
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
            text-align: center;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container" id="resetCard">
        <div class="icon-container" id="iconBox">
            <span class="icon" id="iconEl">🔑</span>
        </div>
        <h1 id="titleEl">Reset Password</h1>
        <p id="descEl">Please enter a new password for your CineFolio account.</p>

        <form id="resetForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required minlength="6">
            </div>
            <div class="error-msg" id="errorMsg">Passwords do not match</div>
            <button type="submit" class="btn" id="submitBtn">Reset Password</button>
        </form>

        <div class="footer">
            &copy; 2026 MM Apps
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('iconEl').textContent = '⚠️';
            document.getElementById('iconEl').style.color = 'var(--error)';
            document.getElementById('titleEl').textContent = 'Invalid Link';
            document.getElementById('descEl').textContent = 'The password reset token is missing. Please request a new link from the mobile app.';
        }

        async function handleSubmit(event) {
            event.preventDefault();
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');

            if (password !== confirmPassword) {
                errorMsg.textContent = "Passwords do not match";
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';

            try {
                const response = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess();
                } else {
                    errorMsg.textContent = data.message || "Failed to reset password. The link may have expired.";
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            } catch (err) {
                errorMsg.textContent = "A network error occurred. Please try again.";
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        }

        function showSuccess() {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('iconBox').classList.add('success');
            document.getElementById('iconEl').classList.add('success');
            document.getElementById('iconEl').textContent = '✓';
            document.getElementById('titleEl').textContent = 'Password Reset!';
            document.getElementById('descEl').innerHTML = 'Your password has been updated. You can now close this tab and return to the CineTracker app to log in.';
        }
    </script>
</body>
</html>
